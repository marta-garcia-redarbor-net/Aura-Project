name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore Aura.sln

      - name: Build
        run: dotnet build Aura.sln --no-restore -c Release

      - name: Test
        run: dotnet test Aura.sln --no-build -c Release --verbosity normal

      - name: Vulnerability audit
        run: |
          echo "Running NuGet vulnerability audit..."
          VULN_OUTPUT=$(dotnet list package --vulnerable 2>&1)
          echo "$VULN_OUTPUT"

          # Fail only on critical or high severity
          if echo "$VULN_OUTPUT" | grep -iE "critical|high" | grep -v "has no vulnerabilities"; then
            echo "::error::Critical or high severity vulnerabilities found!"
            exit 1
          fi

          echo "No critical or high severity vulnerabilities found."
          exit 0
