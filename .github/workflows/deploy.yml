name: Deploy to ACA

on:
  push:
    branches:
      - 'release/*'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore Aura.sln

      - name: Build
        run: dotnet build Aura.sln -c Release --no-restore

      - name: Test (unit + architecture)
        run: |
          dotnet test tests/Aura.UnitTests/Aura.UnitTests.csproj -c Release --no-build --verbosity normal
          dotnet test tests/Aura.ArchitectureTests/Aura.ArchitectureTests.csproj -c Release --no-build --verbosity normal

  push-images:
    needs: build-and-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, ui, workers]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Aura.${{ matrix.service == 'api' && 'Api' || matrix.service == 'ui' && 'UI' || 'Workers' }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/aura-${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/aura-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: push-images
    runs-on: ubuntu-latest
    environment: aca-production
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy API to ACA
        uses: azure/cli@v1
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name aura-api \
              --resource-group ${{ secrets.ACA_RESOURCE_GROUP }} \
              --image ${{ env.IMAGE_PREFIX }}/aura-api:${{ github.sha }}

      - name: Deploy UI to ACA
        uses: azure/cli@v1
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name aura-ui \
              --resource-group ${{ secrets.ACA_RESOURCE_GROUP }} \
              --image ${{ env.IMAGE_PREFIX }}/aura-ui:${{ github.sha }}

      - name: Deploy Workers to ACA
        uses: azure/cli@v1
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name aura-workers \
              --resource-group ${{ secrets.ACA_RESOURCE_GROUP }} \
              --image ${{ env.IMAGE_PREFIX }}/aura-workers:${{ github.sha }}
